<!--
  ┌─────────────────────────────────────────────────┐
  │   물류 뉴스 브리핑 위젯 — 아임웹 HTML 삽입 코드    │
  │                                                   │
  │  사용 전 아래 설정값을 수정하세요:               │
  │  DATA_URL = 본인의 GitHub Pages data.json 주소  │
  └─────────────────────────────────────────────────┘
-->
<div id="ln-root"></div>

<style>
  /* ── 전역 리셋 및 기본 변수 ── */
  #ln-root {
    --ln-primary:   #1a3a5c;
    --ln-accent:    #2e7de0;
    --ln-accent2:   #e8f2ff;
    --ln-risk:      #d94040;
    --ln-risk-bg:   #fff5f5;
    --ln-ok:        #1e8a5e;
    --ln-ok-bg:     #f0faf5;
    --ln-idea:      #6b3fa0;
    --ln-idea-bg:   #f7f0ff;
    --ln-border:    #e0e8f0;
    --ln-bg:        #f5f7fa;
    --ln-card:      #ffffff;
    --ln-text:      #222d3a;
    --ln-sub:       #607080;
    --ln-radius:    12px;
    --ln-shadow:    0 2px 12px rgba(30,70,120,.08);
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    font-size: 14px;
    color: var(--ln-text);
    line-height: 1.65;
    background: var(--ln-bg);
    padding: 20px;
    box-sizing: border-box;
    max-width: 960px;
    margin: 0 auto;
  }

  /* ── 헤더 ── */
  .ln-header {
    background: linear-gradient(135deg, var(--ln-primary) 0%, #2a5fa8 100%);
    color: #fff;
    padding: 22px 28px;
    border-radius: var(--ln-radius);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .ln-header h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
  .ln-header .ln-meta { font-size: 12px; opacity: .8; text-align: right; }

  /* ── 오늘의 한 줄 ── */
  .ln-oneliner {
    background: var(--ln-accent);
    color: #fff;
    padding: 14px 22px;
    border-radius: var(--ln-radius);
    margin-bottom: 20px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -.2px;
  }
  .ln-oneliner::before { content: "💬 "; }

  /* ── 섹션 제목 ── */
  .ln-section-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--ln-primary);
    margin: 0 0 12px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--ln-accent2);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── 브리프 그리드 ── */
  .ln-brief-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .ln-brief-card {
    background: var(--ln-card);
    border: 1px solid var(--ln-border);
    border-radius: var(--ln-radius);
    padding: 16px 18px;
    box-shadow: var(--ln-shadow);
  }
  .ln-brief-card.risk  { border-left: 4px solid var(--ln-risk);  background: var(--ln-risk-bg); }
  .ln-brief-card.oppo  { border-left: 4px solid var(--ln-ok);    background: var(--ln-ok-bg);   }
  .ln-brief-card h3    { margin: 0 0 8px; font-size: 13px; font-weight: 700; color: var(--ln-primary); }
  .ln-brief-card p     { margin: 0; font-size: 13px; color: var(--ln-text); }

  /* ── 뉴스 카드 리스트 ── */
  .ln-news-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 24px;
  }
  .ln-news-card {
    background: var(--ln-card);
    border: 1px solid var(--ln-border);
    border-radius: var(--ln-radius);
    padding: 18px 20px;
    box-shadow: var(--ln-shadow);
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .ln-rank {
    min-width: 36px;
    height: 36px;
    background: var(--ln-primary);
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .ln-news-body { flex: 1; min-width: 0; }
  .ln-news-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 6px;
    align-items: center;
  }
  .ln-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    background: var(--ln-accent2);
    color: var(--ln-accent);
  }
  .ln-badge.domestic { background: #e8f5e9; color: #2e7d32; }
  .ln-badge.global   { background: #e3f2fd; color: #1565c0; }
  .ln-news-title {
    font-size: 14px;
    font-weight: 700;
    margin: 0 0 8px;
    color: var(--ln-text);
  }
  .ln-news-title a {
    color: inherit;
    text-decoration: none;
  }
  .ln-news-title a:hover { color: var(--ln-accent); text-decoration: underline; }
  .ln-summary-list {
    margin: 0 0 8px;
    padding-left: 0;
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .ln-summary-list li {
    font-size: 12.5px;
    color: var(--ln-sub);
    padding-left: 14px;
    position: relative;
  }
  .ln-summary-list li::before {
    content: "▸";
    position: absolute;
    left: 0;
    color: var(--ln-accent);
  }
  .ln-keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }
  .ln-kw {
    background: #f0f4f8;
    color: var(--ln-sub);
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 11px;
  }
  .ln-published { font-size: 11px; color: #aab; margin-top: 6px; }
  .ln-importance {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    color: #f59e0b;
    margin-top: 4px;
  }

  /* ── 콘텐츠 아이디어 ── */
  .ln-ideas-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 24px;
  }
  .ln-idea-card {
    background: var(--ln-card);
    border: 1px solid var(--ln-border);
    border-left: 4px solid var(--ln-idea);
    border-radius: var(--ln-radius);
    padding: 16px 20px;
    box-shadow: var(--ln-shadow);
    background: var(--ln-idea-bg);
  }
  .ln-idea-card h3 {
    margin: 0 0 4px;
    font-size: 14px;
    font-weight: 700;
    color: var(--ln-idea);
  }
  .ln-idea-format {
    display: inline-block;
    background: var(--ln-idea);
    color: #fff;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    margin-bottom: 6px;
  }
  .ln-idea-reason { font-size: 12.5px; color: var(--ln-sub); margin: 0; }

  /* ── 푸터 ── */
  .ln-footer {
    text-align: center;
    font-size: 11px;
    color: #bbb;
    padding-top: 10px;
  }

  /* ── 로딩 / 에러 ── */
  .ln-loading, .ln-error {
    text-align: center;
    padding: 40px;
    color: var(--ln-sub);
  }
  .ln-spinner {
    width: 36px; height: 36px;
    border: 4px solid #e0e8f0;
    border-top-color: var(--ln-accent);
    border-radius: 50%;
    animation: ln-spin .8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes ln-spin { to { transform: rotate(360deg); } }

  /* ── 반응형 ── */
  @media (max-width: 600px) {
    #ln-root { padding: 12px; }
    .ln-news-card { flex-direction: column; gap: 10px; }
    .ln-rank { align-self: flex-start; }
  }
</style>

<script>
(function() {

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // ★ 여기만 수정하세요!
  // GitHub Pages에서 data.json이 서비스되는 URL
  const DATA_URL = "https://YOUR_GITHUB_USERNAME.github.io/YOUR_REPO_NAME/data.json";
  // 예: "https://teaosis.github.io/logistics-news/data.json"
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  const root = document.getElementById("ln-root");

  // 별 아이콘 (중요도)
  function stars(n) {
    const filled = Math.round(Math.min(Math.max(n, 1), 10) / 2);
    return "★".repeat(filled) + "☆".repeat(5 - filled) + ` ${n}/10`;
  }

  // 배지
  function badge(text) {
    const cls = text === "국내" ? "domestic" : text === "해외" ? "global" : "";
    return `<span class="ln-badge ${cls}">${text}</span>`;
  }

  // 뉴스 카드 HTML
  function newsCardHTML(item) {
    const summaryItems = (item.summary || [])
      .map(s => `<li>${escHtml(s)}</li>`).join("");
    const kwHTML = (item.keywords || [])
      .map(k => `<span class="ln-kw">${escHtml(k)}</span>`).join("");

    return `
      <div class="ln-news-card">
        <div class="ln-rank">${item.rank}</div>
        <div class="ln-news-body">
          <div class="ln-news-meta">
            ${badge(item.region)}
            <span class="ln-badge">${escHtml(item.category)}</span>
            <span class="ln-badge" style="background:#f3f4f6;color:#555">${escHtml(item.source)}</span>
          </div>
          <p class="ln-news-title">
            ${item.link
              ? `<a href="${escAttr(item.link)}" target="_blank" rel="noopener">${escHtml(item.title)}</a>`
              : escHtml(item.title)}
          </p>
          <ul class="ln-summary-list">${summaryItems}</ul>
          <div class="ln-importance">${stars(item.importance)}</div>
          ${kwHTML ? `<div class="ln-keywords">${kwHTML}</div>` : ""}
          ${item.published ? `<p class="ln-published">📅 ${escHtml(item.published)}</p>` : ""}
        </div>
      </div>`;
  }

  // 아이디어 카드 HTML
  function ideaCardHTML(idea) {
    const basedOn = (idea.based_on_titles || [])
      .map(t => `<span class="ln-kw">${escHtml(t)}</span>`).join(" ");
    return `
      <div class="ln-idea-card">
        <h3>💡 ${escHtml(idea.video_title)}</h3>
        <span class="ln-idea-format">${escHtml(idea.format)}</span>
        <p class="ln-idea-reason">${escHtml(idea.reason)}</p>
        ${basedOn ? `<div class="ln-keywords" style="margin-top:8px">📰 ${basedOn}</div>` : ""}
      </div>`;
  }

  // 메인 렌더링
  function render(data) {
    const b = data.brief || {};
    const news = data.top_news || [];
    const ideas = data.content_ideas || [];

    root.innerHTML = `
      <!-- 헤더 -->
      <div class="ln-header">
        <h1>🚢 물류 뉴스 일일 브리핑</h1>
        <div class="ln-meta">
          ${escHtml(data.analysis_date || "")}<br>
          갱신: ${escHtml(data.generated_at || "")}
        </div>
      </div>

      <!-- 오늘의 한 줄 -->
      ${b["오늘의한줄"] ? `<div class="ln-oneliner">${escHtml(b["오늘의한줄"])}</div>` : ""}

      <!-- 브리프 카드 그리드 -->
      <p class="ln-section-title">📋 오늘의 총평 &amp; 동향</p>
      <div class="ln-brief-grid">
        ${briefCard("총평",      b["총평"],      "")}
        ${briefCard("🇰🇷 국내 동향", b["국내동향"], "")}
        ${briefCard("🌐 해외 동향", b["해외동향"], "")}
        ${briefCard("⚠️ 리스크 포인트", b["리스크포인트"], "risk")}
        ${briefCard("🌱 기회 포인트", b["기회포인트"], "oppo")}
      </div>

      <!-- 주요 뉴스 -->
      <p class="ln-section-title">📰 오늘의 주요 뉴스 TOP ${news.length}</p>
      <div class="ln-news-list">
        ${news.map(newsCardHTML).join("")}
      </div>

      <!-- 콘텐츠 아이디어 -->
      ${ideas.length > 0 ? `
        <p class="ln-section-title">🎬 콘텐츠 아이디어 제안</p>
        <div class="ln-ideas-list">
          ${ideas.map(ideaCardHTML).join("")}
        </div>
      ` : ""}

      <div class="ln-footer">
        Powered by Gemini AI · 데이터는 매일 오전 7시(KST)에 자동 갱신됩니다.
      </div>
    `;
  }

  function briefCard(title, text, cls) {
    if (!text) return "";
    return `
      <div class="ln-brief-card ${cls}">
        <h3>${title}</h3>
        <p>${escHtml(text)}</p>
      </div>`;
  }

  // XSS 방지 이스케이프
  function escHtml(str) {
    return String(str || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }
  function escAttr(str) { return escHtml(str); }

  // 로딩 표시
  root.innerHTML = `
    <div class="ln-loading">
      <div class="ln-spinner"></div>
      <p>오늘의 물류 뉴스를 불러오는 중...</p>
    </div>`;

  // 데이터 fetch
  fetch(DATA_URL + "?t=" + Date.now())
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    })
    .then(data => render(data))
    .catch(err => {
      root.innerHTML = `
        <div class="ln-error">
          <p>⚠️ 데이터를 불러오지 못했습니다.<br>
          잠시 후 다시 시도하거나 페이지를 새로고침 해주세요.</p>
          <p style="font-size:11px;color:#bbb">${err.message}</p>
        </div>`;
    });
})();
</script>
